---
- name: Update SNOW Incident - Post analysis to work notes
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Prepare analysis for ServiceNow rendering
      ansible.builtin.set_fact:
        formatted_analysis: "{{ alia_analysis | default('No analysis available.') | regex_replace('\n', '<br>') }}"

    - name: Update incident with AI analysis and set to In Progress
      servicenow.itsm.incident:
        sys_id: "{{ incident_sys_id }}"
        state: in_progress
        other:
          work_notes: "{{ formatted_analysis }}"
      register: updated_incident

    - name: Confirm update
      ansible.builtin.debug:
        msg: "Incident {{ updated_incident.record.number }} updated with AI analysis — state set to In Progress"
