---
- name: AI Router - Analyse diagnostics and recommend remediation
  hosts: localhost
  gather_facts: false

  vars:
    alia_base_url: "{{ lookup('env', 'AAP_HOSTNAME') | default('https://aap.sandbox2797.opentlc.com', true) | regex_replace('/+$', '') }}"
    alia_token: "{{ lookup('env', 'ALIA_TOKEN') }}"
    validate_tls: false
    request_timeout: 120

  tasks:

    - name: Build root cause analysis query
      ansible.builtin.set_fact:
        rca_query: |-
          You are an expert site reliability engineer. Analyse the incident and diagnostics data below, then respond with ONLY the following sections. Be specific — reference actual service names, error messages, and config values from the diagnostics.

          ## Root Cause
          A concise explanation of what failed and why.

          ## Step-by-Step Remediation
          Numbered steps an operator should follow to resolve this issue right now. Include specific commands, config changes, or service restarts required. Be precise — assume the operator has SSH access to the affected hosts.

          ## Prevention
          What should change to stop this recurring (config management, monitoring, alerting).

          ---
          Incident: {{ incident_description | default('No incident description provided.') }}

          Diagnostics output:
          {{ diagnostics_report | default('No diagnostics report available.') }}

          Affected components: {{ service_components | default([]) | join(', ') }}

    - name: Call ALIA for root cause analysis
      ansible.builtin.uri:
        url: "{{ alia_base_url }}/api/lightspeed/v1/ai/chat/"
        method: POST
        headers:
          Authorization: "Bearer {{ alia_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          query: "{{ rca_query }}"
        return_content: true
        status_code: 200
        validate_certs: "{{ validate_tls }}"
        timeout: "{{ request_timeout }}"
      register: rca_response

    - name: Extract analysis
      ansible.builtin.set_fact:
        alia_analysis: "{{ (rca_response.json | default((rca_response.content | from_json), true)).response | default('No analysis returned.') }}"

    - name: Display analysis
      ansible.builtin.debug:
        msg: "{{ alia_analysis }}"

    - name: Publish analysis for downstream workflow steps
      ansible.builtin.set_stats:
        data:
          alia_analysis: "{{ alia_analysis }}"
          incident_sys_id: "{{ incident_sys_id }}"
