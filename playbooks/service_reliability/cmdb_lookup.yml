---
- name: CMDB Lookup - Resolve service components and diagnostic parameters
  hosts: localhost
  gather_facts: false

  vars:
    demo_domain: "{{ lookup('env', 'DEMO_DOMAIN') | default('sandbox2797.opentlc.com', true) }}"

  tasks:

    - name: Query incident details
      servicenow.itsm.incident_info:
        sys_id: "{{ incident_sys_id }}"
      register: incident_result

    - name: Extract business service from incident
      ansible.builtin.set_fact:
        business_service_id: "{{ incident_result.records[0].business_service | default('') }}"
        incident_short_desc: "{{ incident_result.records[0].short_description | default('') }}"

    - name: Fail if no business service on incident
      ansible.builtin.fail:
        msg: "Incident {{ incident_sys_id }} has no business service set — cannot resolve components"
      when: business_service_id == ''

    - name: Query CMDB relationships for business service
      servicenow.itsm.configuration_item_relations_info:
        classname: cmdb_ci_service
        sys_id: "{{ business_service_id }}"
      register: rel_result

    - name: Collect child CI sys_ids
      ansible.builtin.set_fact:
        child_ci_ids: "{{ rel_result.record.outbound_relations | map(attribute='target.value') | list }}"

    - name: Query each component CI for details
      servicenow.itsm.configuration_item_info:
        sys_id: "{{ item }}"
      loop: "{{ child_ci_ids }}"
      register: ci_results

    - name: Build component list
      ansible.builtin.set_fact:
        component_details: >-
          {{ ci_results.results
             | map(attribute='records')
             | map('first')
             | selectattr('name', 'defined')
             | list }}

    - name: Identify components by CMDB class
      ansible.builtin.set_fact:
        queue_components: "{{ component_details | selectattr('sys_class_name', 'equalto', 'cmdb_ci_messaging_server') | list }}"
        app_components: "{{ component_details | selectattr('sys_class_name', 'equalto', 'cmdb_ci_appl') | list }}"
        db_components: "{{ component_details | selectattr('sys_class_name', 'equalto', 'cmdb_ci_db_instance') | list }}"
        storage_components: "{{ component_details | selectattr('sys_class_name', 'equalto', 'cmdb_ci_cloud_object_storage') | list }}"

    - name: Derive diagnostic parameters from CMDB component classes
      ansible.builtin.set_fact:
        message_queue_params:
          kafdrop_url: "http://dashboard.{{ demo_domain }}:9000"
          topic_name: "{{ queue_components | first | default({}) | dict2items | selectattr('key', 'equalto', 'short_description') | map(attribute='value') | first | default('payments') }}"
          dlq_topic_name: "{{ queue_components | first | default({}) | dict2items | selectattr('key', 'equalto', 'short_description') | map(attribute='value') | first | default('payments') }}.dlq"
          broker_name: "{{ queue_components | map(attribute='name') | first | default('') }}"
        application_params:
          endpoints: "{{ app_components | map(attribute='name') | list }}"
          ports:
            payment-svc: 5000
            app-svc: 5001
          domain: "{{ demo_domain }}"
        storage_params:
          bucket_name: "{{ storage_components | map(attribute='name') | first | default('') }}"
          region: "{{ lookup('env', 'AWS_REGION') | default('eu-west-1', true) }}"
        database_params:
          host: "{{ db_components | map(attribute='name') | first | default('') }}"
          db_name: "{{ db_components | first | default({}) | dict2items | selectattr('key', 'equalto', 'short_description') | map(attribute='value') | first | default('app_db') }}"
          port: 5432
          domain: "{{ demo_domain }}"

    - name: Display resolved service graph
      ansible.builtin.debug:
        msg: |
          Service graph resolved from CMDB:
          {% for ci in component_details %}
            - {{ ci.name }} ({{ ci.sys_class_name }})
          {% endfor %}

          Diagnostic parameters derived:
            Message Queue: broker={{ message_queue_params.broker_name }}, topic={{ message_queue_params.topic_name }}, dlq={{ message_queue_params.dlq_topic_name }}
            Applications: {{ application_params.endpoints }} (ports: {{ application_params.ports }})
            Storage: bucket={{ storage_params.bucket_name }}, region={{ storage_params.region }}
            Database: host={{ database_params.host }}, db={{ database_params.db_name }}, port={{ database_params.port }}

    - name: Publish parameters for downstream diagnostic nodes
      ansible.builtin.set_stats:
        data:
          incident_sys_id: "{{ incident_sys_id }}"
          incident_description: "{{ incident_description | default(incident_short_desc) }}"
          service_components: "{{ component_details | map(attribute='name') | list }}"
          message_queue_params: "{{ message_queue_params }}"
          application_params: "{{ application_params }}"
          storage_params: "{{ storage_params }}"
          database_params: "{{ database_params }}"
