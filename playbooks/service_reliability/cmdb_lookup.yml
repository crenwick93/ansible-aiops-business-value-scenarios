---
- name: CMDB Lookup - Resolve service components from incident
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Query incident details
      servicenow.itsm.api:
        resource: incident
        action: list
        data:
          sysparm_query: "sys_id={{ incident_sys_id }}"
          sysparm_fields: "sys_id,short_description,business_service"
          sysparm_limit: 1
      register: incident_result

    - name: Extract business service from incident
      ansible.builtin.set_fact:
        business_service_id: "{{ incident_result.record[0].business_service | default('') }}"
        incident_short_desc: "{{ incident_result.record[0].short_description | default('') }}"

    - name: Fail if no business service on incident
      ansible.builtin.fail:
        msg: "Incident {{ incident_sys_id }} has no business service set — cannot resolve components"
      when: business_service_id == ''

    - name: Query CMDB relationships for service components
      servicenow.itsm.api:
        resource: cmdb_rel_ci
        action: list
        data:
          sysparm_query: "parent={{ business_service_id }}"
      register: rel_result

    - name: Collect child CI sys_ids
      ansible.builtin.set_fact:
        child_ci_ids: "{{ rel_result.record | map(attribute='child') | list }}"

    - name: Query each component CI for details
      servicenow.itsm.configuration_item_info:
        sys_id: "{{ item }}"
      loop: "{{ child_ci_ids }}"
      register: ci_results

    - name: Build component summary
      ansible.builtin.set_fact:
        service_components: >-
          {{ ci_results.results
             | map(attribute='records')
             | map('first')
             | selectattr('name', 'defined')
             | map(attribute='name')
             | list }}
        component_details: >-
          {{ ci_results.results
             | map(attribute='records')
             | map('first')
             | selectattr('name', 'defined')
             | list }}

    - name: Display resolved service graph
      ansible.builtin.debug:
        msg: |
          Business service components resolved from CMDB:
          {% for ci in component_details %}
            - {{ ci.name }} ({{ ci.sys_class_name }}) — IP: {{ ci.ip_address | default('N/A') }}
          {% endfor %}

    - name: Publish service component data for downstream workflow steps
      ansible.builtin.set_stats:
        data:
          incident_sys_id: "{{ incident_sys_id }}"
          incident_description: "{{ incident_description | default(incident_short_desc) }}"
          business_service_id: "{{ business_service_id }}"
          service_components: "{{ service_components }}"
          component_details: "{{ component_details }}"
