---
- name: Diagnose Storage
  hosts: localhost
  gather_facts: false

  vars:
    bucket_name: "{{ storage_params.bucket_name | default('') }}"
    bucket_region: "{{ storage_params.region | default('eu-west-1') }}"
    capacity_threshold_gb: 50

  tasks:

    - name: Skip if no storage parameters provided by CMDB
      ansible.builtin.meta: end_play
      when: bucket_name == ''

    - name: Check S3 bucket accessibility
      amazon.aws.s3_bucket_info:
        name: "{{ bucket_name }}"
        region: "{{ bucket_region }}"
      register: bucket_info
      ignore_errors: true

    - name: List objects in bucket
      amazon.aws.aws_s3:
        bucket: "{{ bucket_name }}"
        mode: list
        region: "{{ bucket_region }}"
      register: bucket_objects
      ignore_errors: true
      when: bucket_info is succeeded

    - name: Build diagnostic report
      ansible.builtin.set_fact:
        storage_report: |
          STORAGE DIAGNOSTICS (Object Storage)
          Bucket: {{ bucket_name }}
          Region: {{ bucket_region }}

          Accessibility: {{ 'ACCESSIBLE' if bucket_info is succeeded else 'INACCESSIBLE — bucket may be deleted, permissions revoked, or region misconfigured' }}

          {% if bucket_info is succeeded %}
          Object count: {{ bucket_objects.s3_keys | default([]) | length }}
          Bucket creation date: {{ bucket_info.buckets[0].creation_date | default('unknown') }}
          {% endif %}

          ANALYSIS: {{ 'Object storage is healthy and accessible. Document uploads are functioning normally. The issue is NOT caused by storage problems.' if bucket_info is succeeded else 'Object storage is INACCESSIBLE. This could prevent citizen document uploads from being saved, but would not directly cause payment processing failures.' }}

    - name: Display report
      ansible.builtin.debug:
        msg: "{{ storage_report }}"

    - name: Publish findings for AI Router
      ansible.builtin.set_stats:
        data:
          storage_diagnostics: "{{ storage_report }}"
