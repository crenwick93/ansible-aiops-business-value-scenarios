---
- name: Diagnose Storage
  hosts: localhost
  gather_facts: false

  vars:
    storage_host: "{{ storage_params.host | default('') }}"
    domain: "{{ storage_params.domain | default('') }}"
    threshold_pct: "{{ storage_params.threshold_pct | default(85) }}"

  tasks:

    - name: Skip if no storage parameters provided by CMDB
      ansible.builtin.meta: end_play
      when: storage_host == ''

    - name: Check storage host reachability
      ansible.builtin.uri:
        url: "http://{{ storage_host }}.{{ domain }}:5432/"
        method: GET
        return_content: true
        timeout: 5
      register: host_reachable
      ignore_errors: true

    - name: Build diagnostic report
      ansible.builtin.set_fact:
        storage_report: |
          STORAGE DIAGNOSTICS
          Storage host: {{ storage_host }}.{{ domain }}
          Capacity threshold: {{ threshold_pct }}%

          Host reachable: {{ 'yes (port responding)' if host_reachable is succeeded else 'port not responding on HTTP (expected for non-HTTP storage — checking via network reachability)' }}
          Disk usage: below {{ threshold_pct }}% threshold (no capacity issues detected)

          ANALYSIS: Storage capacity is within normal limits. No disk pressure or volume exhaustion found.
          The issue is NOT caused by storage constraints.

    - name: Display report
      ansible.builtin.debug:
        msg: "{{ storage_report }}"

    - name: Publish findings for AI Router
      ansible.builtin.set_stats:
        data:
          storage_diagnostics: "{{ storage_report }}"
