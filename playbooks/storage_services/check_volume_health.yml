---
- name: Check Volume Health
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Check filesystem usage
      ansible.builtin.shell:
        cmd: df -h --output=target,pcent | tail -n +2
      register: disk_usage
      changed_when: false

    - name: Check for I/O errors in dmesg
      ansible.builtin.shell:
        cmd: dmesg 2>/dev/null | grep -i 'i/o error\|read error\|write error' | tail -5 || echo "no I/O errors"
      register: io_errors
      changed_when: false

    - name: Check PostgreSQL data directory usage (if applicable)
      ansible.builtin.shell:
        cmd: du -sh /var/lib/pgsql/data 2>/dev/null || echo "not a database host"
      register: pg_data_usage
      changed_when: false

    - name: Build diagnostic report
      ansible.builtin.set_fact:
        storage_report: |
          STORAGE DIAGNOSTICS ({{ inventory_hostname }})
          Filesystem usage:
          {{ disk_usage.stdout | default('unavailable') }}
          I/O errors: {{ io_errors.stdout | default('none') }}
          PostgreSQL data dir: {{ pg_data_usage.stdout | default('N/A') }}

    - name: Display report
      ansible.builtin.debug:
        msg: "{{ storage_report }}"

    - name: Publish findings for downstream workflow nodes
      ansible.builtin.set_stats:
        data:
          storage_diagnostics: "{{ storage_report }}"
