---
- name: Check Volume Health
  hosts: localhost
  gather_facts: false

  vars:
    demo_domain: "{{ lookup('env', 'DEMO_DOMAIN') | default('sandbox2797.opentlc.com', true) }}"

  tasks:

    - name: Check PostgreSQL connectivity via app-svc
      ansible.builtin.uri:
        url: "http://app-svc.{{ demo_domain }}:5001/health"
        method: GET
        return_content: true
        timeout: 10
      register: db_connectivity
      ignore_errors: true

    - name: Build storage diagnostic report
      ansible.builtin.set_fact:
        storage_report: |
          STORAGE DIAGNOSTICS
          PostgreSQL connectivity (via app-svc health): {{ db_connectivity.json | default('unreachable') }}
          HTTP response code: {{ db_connectivity.status | default('failed') }}

          Note: app-svc depends on PostgreSQL for application state persistence.
          If app-svc is healthy, the database connection is operational.

    - name: Display storage diagnostics
      ansible.builtin.debug:
        msg: "{{ storage_report }}"

    - name: Publish findings for downstream workflow nodes
      ansible.builtin.set_stats:
        data:
          storage_diagnostics: "{{ storage_report }}"
