---
- name: Diagnose Application
  hosts: localhost
  gather_facts: false

  vars:
    app_endpoints: "{{ application_params.endpoints | default([]) }}"
    app_ports: "{{ application_params.ports | default({}) }}"
    domain: "{{ application_params.domain | default('') }}"
    default_port: 5000

  tasks:

    - name: Skip if no application parameters provided by CMDB
      ansible.builtin.meta: end_play
      when: app_endpoints | length == 0

    - name: Check health endpoint for each application
      ansible.builtin.uri:
        url: "http://{{ item }}.{{ domain }}:{{ app_ports[item] | default(default_port) }}/health"
        method: GET
        return_content: true
        timeout: 10
      loop: "{{ app_endpoints }}"
      register: health_results
      ignore_errors: true

    - name: Build diagnostic report
      ansible.builtin.set_fact:
        app_report: |
          APPLICATION DIAGNOSTICS
          Domain: {{ domain }}
          Components checked: {{ app_endpoints | join(', ') }}

          {% for result in health_results.results %}
          {{ result.item }}:
            URL: http://{{ result.item }}.{{ domain }}:{{ app_ports[result.item] | default(default_port) }}/health
            HTTP status: {{ result.status | default('unreachable') }}
            Response: {{ result.json | default('no response') }}
          {% endfor %}

          ANALYSIS: {% if health_results.results | selectattr('failed', 'equalto', true) | list | length > 0 %}One or more application endpoints are unreachable — possible service outage or deployment issue.{% else %}All application services report healthy. The issue is NOT a service outage. When services are up but processing is stalled, the problem is typically a configuration or routing issue — not infrastructure failure.{% endif %}

    - name: Display report
      ansible.builtin.debug:
        msg: "{{ app_report }}"

    - name: Publish findings for AI Router
      ansible.builtin.set_stats:
        data:
          application_diagnostics: "{{ app_report }}"
