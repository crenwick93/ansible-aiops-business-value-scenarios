---
- name: Diagnose Application - Health Checks
  hosts: localhost
  gather_facts: false

  vars:
    app_endpoints: "{{ application_params.endpoints | default([]) }}"
    app_ports: "{{ application_params.ports | default({}) }}"
    domain: "{{ application_params.domain | default('') }}"
    default_port: 5000

  tasks:

    - name: Skip if no application parameters provided by CMDB
      ansible.builtin.meta: end_play
      when: app_endpoints | length == 0

    - name: Check health endpoint for each application
      ansible.builtin.uri:
        url: "http://{{ item }}.{{ domain }}:{{ app_ports[item] | default(default_port) }}/health"
        method: GET
        return_content: true
        timeout: 10
      loop: "{{ app_endpoints }}"
      register: health_results
      ignore_errors: true

    - name: Build health report
      ansible.builtin.set_fact:
        health_report: |
          APPLICATION HEALTH
          Domain: {{ domain }}
          Components checked: {{ app_endpoints | join(', ') }}

          {% for result in health_results.results %}
          {{ result.item }}:
            URL: http://{{ result.item }}.{{ domain }}:{{ app_ports[result.item] | default(default_port) }}/health
            HTTP status: {{ result.status | default('unreachable') }}
            Response: {{ result.json | default('no response') }}
          {% endfor %}

          Summary: {{ health_results.results | selectattr('failed', 'equalto', true) | list | length }} of {{ health_results.results | length }} services unreachable.

    - name: Store health report for later
      ansible.builtin.set_stats:
        data:
          _health_report: "{{ health_report }}"

- name: Diagnose Application - Collect Service Logs
  hosts: payment-svc
  gather_facts: false

  tasks:

    - name: Collect recent service logs
      ansible.builtin.command:
        cmd: journalctl -u payment-svc --no-pager -n 20 --output=short
      register: service_logs
      changed_when: false
      become: true

    - name: Build full diagnostic report
      ansible.builtin.set_fact:
        app_report: |
          {{ _health_report | default('Health check data unavailable') }}

          RECENT SERVICE LOGS (payment-svc, last 20 lines):
          {{ service_logs.stdout }}

    - name: Display report
      ansible.builtin.debug:
        msg: "{{ app_report }}"

    - name: Publish findings for AI Router
      ansible.builtin.set_stats:
        data:
          application_diagnostics: "{{ app_report }}"
