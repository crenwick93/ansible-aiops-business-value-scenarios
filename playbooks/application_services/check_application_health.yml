---
- name: Check Application Health
  hosts: localhost
  gather_facts: false

  vars:
    demo_domain: "{{ lookup('env', 'DEMO_DOMAIN') | default('sandbox2797.opentlc.com', true) }}"
    payment_svc_url: "http://payment-svc.{{ demo_domain }}:5000"
    app_svc_url: "http://app-svc.{{ demo_domain }}:5001"

  tasks:

    - name: Check payment-svc health endpoint
      ansible.builtin.uri:
        url: "{{ payment_svc_url }}/health"
        method: GET
        return_content: true
        timeout: 10
      register: payment_health
      ignore_errors: true

    - name: Check app-svc health endpoint
      ansible.builtin.uri:
        url: "{{ app_svc_url }}/health"
        method: GET
        return_content: true
        timeout: 10
      register: app_health
      ignore_errors: true

    - name: Build application diagnostic report
      ansible.builtin.set_fact:
        app_report: |
          APPLICATION DIAGNOSTICS
          payment-svc ({{ payment_svc_url }}):
            Health status: {{ payment_health.json | default('unreachable') }}
            HTTP response code: {{ payment_health.status | default('failed') }}

          app-svc ({{ app_svc_url }}):
            Health status: {{ app_health.json | default('unreachable') }}
            HTTP response code: {{ app_health.status | default('failed') }}

          Note: Both services report healthy. The issue is NOT a service outage — it is
          likely a configuration or routing problem at the application layer.

    - name: Display application diagnostics
      ansible.builtin.debug:
        msg: "{{ app_report }}"

    - name: Publish findings for downstream workflow nodes
      ansible.builtin.set_stats:
        data:
          application_diagnostics: "{{ app_report }}"
