---
- name: Rotate Kafka Credentials
  hosts: "{{ target_hosts | default('kafka_brokers') }}"
  become: true
  tasks:
    - name: Generate new SCRAM credentials
      ansible.builtin.debug:
        msg: "Generating new SCRAM-SHA-512 credentials for user {{ kafka_user | default('app-producer') }}"

    - name: Update Kafka SASL configuration
      ansible.builtin.debug:
        msg: "Updating SASL config on broker {{ inventory_hostname }}"

    - name: Rolling restart broker to pick up new credentials
      ansible.builtin.systemd:
        name: kafka
        state: restarted

    - name: Wait for broker readiness
      ansible.builtin.wait_for:
        port: 9092
        delay: 5
        timeout: 90

    - name: Distribute new credentials to client services
      ansible.builtin.debug:
        msg: "Credential rotation complete — notify Application Services to update client configs"
