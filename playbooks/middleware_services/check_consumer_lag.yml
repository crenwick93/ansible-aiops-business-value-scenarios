---
- name: Check Consumer Lag
  hosts: localhost
  gather_facts: false

  vars:
    demo_domain: "{{ lookup('env', 'DEMO_DOMAIN') | default('sandbox2797.opentlc.com', true) }}"
    kafdrop_url: "http://dashboard.{{ demo_domain }}:9000"

  tasks:

    - name: Get payments topic info from Kafdrop
      ansible.builtin.uri:
        url: "{{ kafdrop_url }}/topic/payments"
        method: GET
        headers:
          Accept: "application/json"
        return_content: true
        timeout: 10
      register: payments_topic
      ignore_errors: true

    - name: Get payments.dlq topic info from Kafdrop
      ansible.builtin.uri:
        url: "{{ kafdrop_url }}/topic/payments.dlq"
        method: GET
        headers:
          Accept: "application/json"
        return_content: true
        timeout: 10
      register: dlq_topic
      ignore_errors: true

    - name: Sample recent messages from payments.dlq
      ansible.builtin.uri:
        url: "{{ kafdrop_url }}/topic/payments.dlq/messages?partition=0&offset=0&count=10"
        method: GET
        headers:
          Accept: "application/json"
        return_content: true
        timeout: 10
      register: dlq_messages
      ignore_errors: true

    - name: Sample recent messages from payments topic
      ansible.builtin.uri:
        url: "{{ kafdrop_url }}/topic/payments/messages?partition=0&offset=0&count=10"
        method: GET
        headers:
          Accept: "application/json"
        return_content: true
        timeout: 10
      register: payments_messages
      ignore_errors: true

    - name: Build Kafka diagnostic report
      ansible.builtin.set_fact:
        kafka_report: |
          KAFKA DIAGNOSTICS
          Kafdrop endpoint: {{ kafdrop_url }}

          Topic 'payments':
          {{ payments_topic.json | default('unreachable') | to_nice_json }}

          Topic 'payments.dlq':
          {{ dlq_topic.json | default('unreachable') | to_nice_json }}

          Sample messages from payments.dlq (dead letter queue):
          {% for msg in (dlq_messages.json | default([])) %}
          - {{ msg.value | default(msg) }}
          {% endfor %}

          Sample messages from payments (healthy topic):
          {% for msg in (payments_messages.json | default([])) %}
          - {{ msg.value | default(msg) }}
          {% endfor %}

    - name: Display Kafka diagnostics
      ansible.builtin.debug:
        msg: "{{ kafka_report }}"

    - name: Publish findings for downstream workflow nodes
      ansible.builtin.set_stats:
        data:
          kafka_diagnostics: "{{ kafka_report }}"
