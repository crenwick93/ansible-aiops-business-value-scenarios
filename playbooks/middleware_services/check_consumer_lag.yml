---
- name: Check Consumer Lag
  hosts: localhost
  gather_facts: false

  vars:
    demo_domain: "{{ lookup('env', 'DEMO_DOMAIN') | default('sandbox2797.opentlc.com', true) }}"
    kafdrop_url: "http://dashboard.{{ demo_domain }}:9000"
    dashboard_url: "http://dashboard.{{ demo_domain }}:8080"

  tasks:

    - name: Get payments topic stats from Kafdrop
      ansible.builtin.uri:
        url: "{{ kafdrop_url }}/topic/payments"
        method: GET
        headers:
          Accept: "application/json"
        return_content: true
        timeout: 10
      register: payments_topic
      ignore_errors: true

    - name: Get payments.dlq topic stats from Kafdrop
      ansible.builtin.uri:
        url: "{{ kafdrop_url }}/topic/payments.dlq"
        method: GET
        headers:
          Accept: "application/json"
        return_content: true
        timeout: 10
      register: dlq_topic
      ignore_errors: true

    - name: Get engineering overview from dashboard
      ansible.builtin.uri:
        url: "{{ dashboard_url }}/api/engineering/overview"
        method: GET
        return_content: true
        timeout: 10
      register: eng_overview
      ignore_errors: true

    - name: Calculate message counts
      ansible.builtin.set_fact:
        payments_count: "{{ payments_topic.json.partitions[0].size | default(0) }}"
        dlq_count: "{{ dlq_topic.json.partitions[0].size | default(0) }}"
      when: payments_topic is succeeded and dlq_topic is succeeded

    - name: Build Kafka diagnostic report
      ansible.builtin.set_fact:
        kafka_report: |
          KAFKA DIAGNOSTICS
          =================
          Topic: payments
            Total messages: {{ payments_count | default('unknown') }}
            Partitions: {{ (payments_topic.json.partitions | default([])) | length }}
            Consumer group 'app-svc' is subscribed to this topic

          Topic: payments.dlq (DEAD LETTER QUEUE)
            Total messages: {{ dlq_count | default('unknown') }}
            Partitions: {{ (dlq_topic.json.partitions | default([])) | length }}
            WARNING: No consumer is processing messages from the DLQ. Messages sent here are STUCK.

          KEY FINDING: The dead letter queue contains {{ dlq_count | default('?') }} messages.
          This is {{ ((dlq_count | default(0) | int) * 100 / ((payments_count | default(1) | int) + (dlq_count | default(0) | int))) | round(1) }}% of all payment messages.
          A healthy system should have near-zero messages in the DLQ.
          This volume indicates messages are being ROUTED to the DLQ by the payment-svc, not failing after processing.

          Platform overview:
          {{ eng_overview.json | default({}) | to_nice_json }}

    - name: Display Kafka diagnostics
      ansible.builtin.debug:
        msg: "{{ kafka_report }}"

    - name: Publish findings for downstream workflow nodes
      ansible.builtin.set_stats:
        data:
          kafka_diagnostics: "{{ kafka_report }}"
