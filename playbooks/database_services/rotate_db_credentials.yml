---
- name: Rotate Database Credentials
  hosts: "{{ target_hosts | default('db_servers') }}"
  become: true
  become_user: postgres
  tasks:
    - name: Validate parameters
      ansible.builtin.assert:
        that:
          - db_user is defined
        fail_msg: "Required: db_user (the database user to rotate)"

    - name: Generate new password
      ansible.builtin.debug:
        msg: "Generating new credential for user {{ db_user }}"

    - name: Update PostgreSQL role password
      ansible.builtin.shell:
        cmd: psql -c "ALTER ROLE {{ db_user }} WITH PASSWORD '{{ new_password | default('GENERATED') }}';"
      no_log: true

    - name: Force disconnect existing sessions
      ansible.builtin.shell:
        cmd: >-
          psql -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity
          WHERE usename = '{{ db_user }}' AND pid <> pg_backend_pid();"
      when: force_disconnect | default(false) | bool

    - name: Update credential in vault
      ansible.builtin.debug:
        msg: "Credential rotated — update downstream services and vault"
