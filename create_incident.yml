---
- name: Create demo incident in ServiceNow
  hosts: localhost
  gather_facts: false

  environment:
    SN_HOST: "{{ lookup('env', 'SERVICENOW_INSTANCE_URL') }}"
    SN_USERNAME: "{{ lookup('env', 'SERVICENOW_USERNAME') }}"
    SN_PASSWORD: "{{ lookup('env', 'SERVICENOW_PASSWORD') }}"

  vars:
    sn_instance: "{{ lookup('env', 'SERVICENOW_INSTANCE_URL') }}"
    caller_name: "{{ lookup('env', 'SERVICENOW_CALLER_NAME') | default('Chris Renwick', true) | lower | replace(' ', '.') }}"

  tasks:
    - name: Look up business service sys_id
      servicenow.itsm.configuration_item_info:
        name: "Passport online application service"
      register: service_lookup

    - name: Set business service ID
      ansible.builtin.set_fact:
        business_service_id: "{{ service_lookup.records[0].sys_id }}"

    - name: Create incident
      servicenow.itsm.incident:
        state: new
        caller: "{{ caller_name }}"
        short_description: "Passport applications stuck at payment stage - citizens waiting 14+ days"
        description: |
          Call centre receiving increasing complaints from citizens whose standard adult
          passport applications are stuck at "Payment Received - Awaiting Processing".
          Citizens have been charged but applications are not progressing to the processing stage.

          Affected references reported by citizens:
          - CIT-SMITH01 — submitted 21 April, last updated 23 April, stuck 17 days
          - CIT-JONES02 — submitted 19 April, stuck 18 days
          - CIT-PATEL03 — submitted 17 April, stuck 20 days

          Citizen-facing status page shows red warning: "Your payment was received
          but your application has not yet progressed."

        impact: medium
        urgency: high
        other:
          category: software
          business_service: "{{ business_service_id }}"
          assignment_group: "Service Reliability"
      register: incident

    - name: Show incident details
      ansible.builtin.debug:
        msg: |
          Incident created: {{ incident.record.number }}
          Priority: {{ incident.record.priority }}
          URL: {{ sn_instance }}/incident.do?sys_id={{ incident.record.sys_id }}
