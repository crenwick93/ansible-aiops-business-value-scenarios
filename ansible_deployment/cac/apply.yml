---
- name: Apply AAP objects (Controller and EDA) via infra.aap_configuration
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - infra.aap_configuration

  vars:
    # AAP 2.5+ single gateway URL/token (provided via env or -e)
    aap_hostname: "{{ lookup('env', 'AAP_HOSTNAME') | default(omit, true) }}"
    aap_token: "{{ lookup('env', 'AAP_TOKEN') | default(omit, true) }}"
    aap_validate_certs: "{{ (lookup('env', 'AAP_VALIDATE_CERTS') | default('true', true)) | bool }}"
    # Note: Organizations are now defined explicitly in vars.yml (no longer single-org mode)

    # Logging toggles
    aap_configuration_secure_logging: false
    aap_configuration_collect_logs: true

    # ServiceNow env inputs (required)
    sn_instance: "{{ lookup('env', 'SERVICENOW_INSTANCE_URL') | default(omit, true) }}"
    sn_username: "{{ lookup('env', 'SERVICENOW_USERNAME') | default(omit, true) }}"
    sn_password: "{{ lookup('env', 'SERVICENOW_PASSWORD') | default(omit, true) }}"

    # ALIA token (required)
    alia_token: "{{ lookup('env', 'ALIA_TOKEN') | default(omit, true) }}"

    # Monitoring SSH key (EC2 instance provisioned by Terraform — used for Machine credentials)
    monitoring_ssh_key: "{{ lookup('file', monitoring_ssh_key_path, errors='ignore') | default(omit, true) }}"
    monitoring_ssh_key_path: "{{ lookup('env', 'MONITORING_SSH_KEY_PATH') | default(playbook_dir + '/../../infra/terraform/aiops-demo.pem', true) }}"

    # Host IPs (override via env for dynamic environments; defaults match Terraform outputs)
    payment_svc_ip: "{{ lookup('env', 'PAYMENT_SVC_IP') | default('10.0.1.182', true) }}"
    app_svc_ip: "{{ lookup('env', 'APP_SVC_IP') | default('10.0.1.16', true) }}"
    kafka_ip: "{{ lookup('env', 'KAFKA_IP') | default('10.0.2.30', true) }}"
    postgres_ip: "{{ lookup('env', 'POSTGRES_IP') | default('10.0.3.61', true) }}"

    # Git repo URL — this project's repo (override with GIT_REPO_URL in .env for forks)
    git_repo_url: "{{ lookup('env', 'GIT_REPO_URL') | default('https://github.com/crenwick93/ansible-aiops-business-value-scenarios.git', true) }}"

    # EDA custom Decision Environment image (build and push your own, then set DE_IMAGE in .env)
    de_image: "{{ lookup('env', 'DE_IMAGE') | default('quay.io/crenwick93/snow-de:latest', true) }}"
  vars_files:
    - vars.yml
  roles:
    - role: infra.aap_configuration.dispatch
