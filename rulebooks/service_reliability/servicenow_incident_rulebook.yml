---
- name: Monitor ServiceNow incidents
  hosts: all
  execution_strategy: parallel
  sources:
    - servicenow.itsm.records:
        table: incident
        interval: 10
        remote_servicenow_timezone: "Europe/London"
        sysparm_query: >
          state=1^ORDERBYDESCsys_created_on
      filters:
        - ansible.eda.json_filter:
        - ansible.eda.normalize_keys:
  rules:
    - name: Run diagnostics and enrich incident
      throttle:
        once_within: 10 minutes
        group_by_attributes:
          - sys_id
      condition: event.short_description is defined
      action:
        run_workflow_template:
          name: Incident Diagnostics Workflow
          organization: Service Reliability
          post_events: true
          job_args:
            extra_vars:
              incident_description: "{{ event.short_description + ' ' + event.description }}"
              incident_sys_id: "{{ event.sys_id }}"
