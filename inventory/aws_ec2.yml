---
# Ansible dynamic inventory — AWS EC2
#
# Uses the aws_ec2 inventory plugin to discover demo instances by their
# Project tag.  Groups hosts by their Role tag so playbooks can target
# "kafka", "postgres", "payment-svc", or "app-svc" directly.
#
# Prerequisites:
#   pip install boto3 botocore
#   AWS credentials configured (env vars, profile, or instance role)

plugin: amazon.aws.aws_ec2

regions:
  - "{{ lookup('env', 'AWS_REGION') | default('eu-west-1', true) }}"

filters:
  tag:Project: aiops-demo
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: ""
    separator: ""

hostnames:
  - private-ip-address

compose:
  ansible_host: private_ip_address
  ansible_user: ec2-user
  ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_PRIVATE_KEY_PATH') }}"
